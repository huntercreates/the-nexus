<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>The Nexus — Creative Universe</title>
<style>
:root{--bg:#0c0d10;--bg2:#141519;--bg3:#1c1d24;--card:#1e1f27;--border:#22232e;--border2:#2c2d3c;--text:#e4e4f0;--text2:#8888a0;--text3:#44445a;--acc:#e8b84b;--acc2:#e8b84b99;--accbg:#e8b84b15;--red:#e05555;--redbg:rgba(224,85,85,.12);--green:#4ade80;--greenbg:rgba(74,222,128,.1);--blue:#5a9ef8;--bluebg:rgba(90,158,248,.1);--purple:#a78bfa;--purplebg:rgba(167,139,250,.1);--font:Georgia,serif;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:16px;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:.3;}50%{opacity:1;}}
@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade{animation:up .25s ease;}
input,select,textarea,button{font-family:inherit;}
/* LAYOUT */
#app{display:flex;height:100vh;overflow:hidden;}
/* SIDEBAR */
#sb{width:200px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .2s;overflow:hidden;}
#sb.col{width:52px;}
.sb-head{padding:1rem .9rem .8rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;min-height:56px;flex-shrink:0;}
.sb-brand{overflow:hidden;}
.sb-name{font-weight:700;font-size:1rem;color:var(--acc);white-space:nowrap;}
.sb-sub{font-family:monospace;font-size:.4rem;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}
.sb-tog{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.9rem;flex-shrink:0;padding:.1rem;transition:color .15s;}
.sb-tog:hover{color:var(--acc);}
.sb-srch{padding:.5rem .75rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.sb-srch input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:.3rem .55rem;color:var(--text);font-size:.7rem;outline:none;box-sizing:border-box;}
.sb-nav{flex:1;overflow-y:auto;overflow-x:hidden;}
.sb-sec{font-family:monospace;font-size:.4rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);padding:.28rem .9rem .18rem;border-top:1px solid var(--border);}
.ni{display:flex;align-items:center;gap:.55rem;padding:.52rem .9rem;cursor:pointer;border-left:2px solid transparent;transition:all .15s;}
.ni:hover{background:var(--accbg);}
.ni.on{background:var(--accbg);border-left-color:var(--acc);}
.ni.on .nl{color:var(--acc);font-weight:700;}
.ni-ico{font-size:.82rem;width:18px;text-align:center;flex-shrink:0;}
.nl{font-size:.78rem;color:var(--text2);}
.nc{margin-left:auto;font-family:monospace;font-size:.42rem;background:var(--border2);color:var(--text3);padding:.07rem .28rem;border-radius:20px;}
.ni.on .nc{background:var(--acc2);color:var(--bg);}
.sb-foot{padding:.62rem .8rem;border-top:1px solid var(--border);flex-shrink:0;}
.sb-user{display:flex;align-items:center;gap:.5rem;}
.uav{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--acc2),var(--acc));display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;color:var(--bg);flex-shrink:0;cursor:pointer;}
.ui{flex:1;min-width:0;overflow:hidden;}
.un{font-size:.7rem;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ur{font-family:monospace;font-size:.4rem;color:var(--acc);text-transform:uppercase;letter-spacing:.07em;}
.sb-set{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.76rem;flex-shrink:0;transition:color .15s;}
.sb-set:hover{color:var(--text);}
.str-bar{display:flex;gap:.65rem;margin-top:.35rem;justify-content:center;}
.str-i{font-family:monospace;font-size:.41rem;}
/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{padding:.68rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);flex-shrink:0;}
.tb-title{font-weight:700;font-size:.93rem;color:var(--text);}
.tb-r{display:flex;align-items:center;gap:.55rem;}
.vstats{font-family:monospace;font-size:.44rem;color:var(--text3);}
#adot{width:8px;height:8px;border-radius:50%;background:var(--border2);cursor:pointer;transition:background .2s;flex-shrink:0;}
#adot.on{background:var(--acc);}
#adot:hover{background:var(--acc2);}
#content{flex:1;overflow-y:auto;padding:1.5rem;}
/* MOBILE NAV */
#mobnav{display:none;position:fixed;bottom:0;left:0;right:0;background:#111218;border-top:1px solid var(--border);z-index:90;padding:.45rem 0;overflow-x:auto;}
.mb{display:flex;flex-direction:column;align-items:center;gap:.2rem;padding:.32rem .68rem;cursor:pointer;border:none;background:none;color:var(--text3);min-width:56px;flex-shrink:0;transition:color .15s;}
.mb.on{color:var(--acc);}
.mbi{font-size:1.2rem;}
.mbl{font-family:monospace;font-size:.43rem;text-transform:uppercase;}
/* CARDS */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:1rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s;}
.card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.35);}
.cc{height:108px;overflow:hidden;background:linear-gradient(135deg,var(--bg3),var(--border));display:flex;align-items:center;justify-content:center;font-size:2rem;}
.cc img{width:100%;height:100%;object-fit:cover;}
.cb{padding:1rem;}
.ct{font-family:monospace;font-size:.45rem;letter-spacing:.13em;text-transform:uppercase;color:var(--acc);margin-bottom:5px;}
.ctit{font-weight:700;font-size:.88rem;color:var(--text);margin-bottom:6px;line-height:1.35;}
.cdesc{font-size:.77rem;color:var(--text2);line-height:1.65;margin-bottom:.6rem;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.cf{display:flex;align-items:center;justify-content:space-between;}
.cauth{font-family:monospace;font-size:.45rem;color:var(--text3);}
.clikes{font-family:monospace;font-size:.49rem;color:var(--text3);cursor:pointer;background:none;border:none;transition:color .15s;}
.clikes:hover{color:var(--red);}
/* BUTTONS */
.btn{font-family:var(--font);font-size:.73rem;font-weight:700;padding:.38rem .9rem;border-radius:7px;border:none;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:.3rem;white-space:nowrap;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-g{background:var(--acc);color:var(--bg);}
.btn-r{background:var(--redbg);color:var(--red);border:1px solid var(--red);}
.btn-gr{background:var(--greenbg);color:var(--green);border:1px solid var(--green);}
.btn-b{background:var(--bluebg);color:var(--blue);border:1px solid var(--blue);}
.btn-p{background:var(--purplebg);color:var(--purple);border:1px solid var(--purple);}
.btn-gh{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-gh:hover{border-color:var(--acc2);color:var(--acc);}
.btn-sm{padding:.22rem .48rem;font-size:.64rem;}
/* INPUTS */
.inp,.ta,.sel{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:.5rem .75rem;color:var(--text);font-family:var(--font);font-size:.83rem;outline:none;box-sizing:border-box;transition:border-color .15s;}
.inp:focus,.ta:focus,.sel:focus{border-color:var(--acc2);}
.ta{resize:vertical;min-height:90px;}
.sel{cursor:pointer;}
.pw-w{position:relative;}
.pw-w input{padding-right:2.2rem;}
.pw-tog{position:absolute;right:.5rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:.75rem;}
/* LABELS / BADGES */
.lbl{font-family:monospace;font-size:.5rem;letter-spacing:.13em;text-transform:uppercase;color:var(--text3);display:block;margin-top:12px;margin-bottom:5px;}
.bdg{font-family:monospace;font-size:.46rem;letter-spacing:.1em;text-transform:uppercase;padding:.17rem .42rem;border-radius:5px;}
.bdg-g{background:var(--accbg);color:var(--acc);}
.bdg-r{background:var(--redbg);color:var(--red);}
.bdg-gr{background:var(--greenbg);color:var(--green);}
.bdg-b{background:var(--bluebg);color:var(--blue);}
.bdg-gh{background:var(--border);color:var(--text2);}
/* SECTIONS */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid var(--border);}
.sec-t{font-weight:700;font-size:.95rem;color:var(--text);}
/* HERO */
.hero{background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid var(--border);border-radius:14px;padding:2rem;margin-bottom:2rem;}
.hero-eye{font-family:monospace;font-size:.5rem;letter-spacing:.22em;text-transform:uppercase;color:var(--acc);margin-bottom:7px;}
.hero-t{font-weight:700;font-size:1.6rem;color:var(--text);line-height:1.1;margin-bottom:.65rem;}
.hero-s{color:var(--text2);font-size:.87rem;line-height:1.85;}
/* STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;}
.sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;}
.sn{font-weight:700;font-size:1.6rem;color:var(--acc);line-height:1;}
.sl{font-family:monospace;font-size:.44rem;letter-spacing:.11em;text-transform:uppercase;color:var(--text3);margin-top:5px;}
/* FILTER BAR */
.fbar{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.25rem;}
.fb{background:transparent;color:var(--text3);border:1px solid var(--border2);padding:.22rem .55rem;font-size:.65rem;border-radius:20px;cursor:pointer;font-family:var(--font);transition:all .15s;}
.fb.on{background:var(--accbg);color:var(--acc);border-color:var(--acc2);}
/* AD SLOT */
.ad{width:100%;height:68px;border:1px dashed var(--border2);border-radius:10px;display:flex;align-items:center;justify-content:center;background:repeating-linear-gradient(45deg,var(--bg3) 0,var(--bg3) 8px,var(--bg2) 8px,var(--bg2) 16px);margin-bottom:1.75rem;}
.ad span{font-family:monospace;font-size:.44rem;color:var(--text3);}
/* OVERLAY */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.ob{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;max-width:660px;width:100%;max-height:88vh;overflow-y:auto;}
.oh{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.ot{font-weight:700;font-size:1.05rem;color:var(--text);}
.oc{background:none;border:none;color:var(--text3);font-size:1.15rem;cursor:pointer;}
.obody{padding:1.25rem 1.5rem;}
/* ITEM ROWS */
.irow{display:flex;align-items:center;gap:.6rem;padding:.68rem .9rem;background:var(--bg3);border:1px solid var(--border);border-radius:9px;margin-bottom:.42rem;}
.irt{font-weight:700;font-size:.8rem;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.irm{font-family:monospace;font-size:.44rem;color:var(--text3);}
/* ADMIN TABS */
.atabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;}
.atab{background:transparent;border:none;border-bottom:2px solid transparent;padding:.55rem .88rem;font-size:.67rem;font-weight:700;cursor:pointer;color:var(--text2);white-space:nowrap;font-family:var(--font);transition:all .15s;}
.atab.on{color:var(--acc);border-bottom-color:var(--acc);background:var(--accbg);}
/* ADMIN STATS */
.asgs{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.25rem;}
.asc{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:1.1rem;}
.asn{font-weight:700;font-size:1.4rem;color:var(--acc);line-height:1;}
.asl{font-family:monospace;font-size:.44rem;color:var(--text3);margin-top:5px;text-transform:uppercase;}
/* WRITE EDITOR */
.etb{background:var(--bg3);border:1px solid var(--border);border-radius:9px 9px 0 0;padding:.42rem .58rem;display:flex;flex-wrap:wrap;gap:.14rem;align-items:center;}
.tbtn{background:transparent;color:var(--text2);border:1px solid var(--border2);padding:.2rem .38rem;font-size:.64rem;border-radius:5px;cursor:pointer;min-width:26px;line-height:1.25;font-family:serif;transition:all .15s;}
.tbtn:hover{background:var(--accbg);color:var(--acc);border-color:var(--acc2);}
.tdiv{width:1px;height:16px;background:var(--border2);margin:0 .07rem;}
.ea{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 9px 9px;padding:1.3rem 1.45rem;min-height:320px;outline:none;color:var(--text);font-size:.93rem;line-height:1.9;word-break:break-word;}
.efoot{display:flex;align-items:center;justify-content:space-between;margin-top:.6rem;padding:.62rem .88rem;background:var(--bg3);border-radius:9px;flex-wrap:wrap;gap:.4rem;}
.estats{font-family:monospace;font-size:.48rem;color:var(--text3);}
/* LIBRARY */
.libi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.15rem 1.3rem;cursor:pointer;transition:all .2s;margin-bottom:.85rem;}
.libi:hover{border-color:var(--border2);transform:translateY(-2px);}
.librow{display:flex;gap:1.1rem;align-items:flex-start;}
.libthumb{width:76px;height:76px;border-radius:9px;background:linear-gradient(135deg,var(--bg3),var(--border));display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0;}
.libthumb img{width:76px;height:76px;border-radius:9px;object-fit:cover;}
.libin{flex:1;min-width:0;}
.libt{font-weight:700;font-size:.9rem;color:var(--text);margin-bottom:.38rem;}
.libd{font-size:.79rem;color:var(--text2);line-height:1.65;margin-bottom:.55rem;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.libm{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;}
.libmi{font-family:monospace;font-size:.45rem;color:var(--text3);}
.starbtn{background:none;border:none;cursor:pointer;font-size:.98rem;line-height:1;padding:.05rem;transition:color .15s;}
/* POETRY */
.poi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.15rem 1.3rem;cursor:pointer;transition:all .2s;display:flex;gap:1rem;align-items:flex-start;margin-bottom:.7rem;}
.poi:hover{border-color:var(--border2);transform:translateY(-1px);}
.ponum{font-weight:700;font-size:1.3rem;color:var(--border2);line-height:1;min-width:40px;}
/* CHAR */
.chg{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.65rem;}
.chi{display:flex;align-items:center;gap:.7rem;padding:.75rem .92rem;background:var(--card);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:border-color .15s;}
.chi:hover{border-color:var(--border2);}
.chico{width:32px;height:32px;border-radius:7px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;}
/* RANKING */
.ri{display:flex;align-items:center;gap:.88rem;padding:.88rem 1.25rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.ri:hover{background:var(--bg3);}
/* SUGGESTION */
.scard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.15rem 1.3rem;margin-bottom:.85rem;}
.sinner{display:flex;gap:1.1rem;align-items:flex-start;}
.vcol{display:flex;flex-direction:column;align-items:center;gap:.35rem;min-width:50px;padding-top:.2rem;}
.vbtn{background:none;border:1px solid var(--border2);border-radius:7px;width:38px;height:32px;cursor:pointer;color:var(--acc);font-size:.88rem;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.vbtn:hover{background:var(--accbg);}
.vcnt{font-weight:700;font-size:1.05rem;color:var(--acc);}
.vlbl{font-family:monospace;font-size:.41rem;color:var(--text3);text-transform:uppercase;}
/* NYX */
#nyx-btn{position:fixed;bottom:1.5rem;right:1.5rem;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--blue));border:none;cursor:pointer;box-shadow:0 4px 24px rgba(167,139,250,.4);z-index:150;font-size:1.15rem;color:#fff;display:flex;align-items:center;justify-content:center;transition:transform .2s;}
#nyx-btn:hover{transform:scale(1.08);}
#nyx-panel{position:fixed;bottom:1.5rem;right:1.5rem;width:320px;height:484px;background:var(--bg2);border:1px solid var(--border2);border-radius:16px;display:none;flex-direction:column;z-index:150;box-shadow:0 20px 60px rgba(0,0,0,.55);overflow:hidden;}
#nyx-panel.open{display:flex;}
.nyxh{padding:.82rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,var(--purplebg),transparent);}
.nyxta{display:flex;align-items:center;gap:.58rem;}
.nyxico{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--blue));display:flex;align-items:center;justify-content:center;font-size:.85rem;color:#fff;}
.nyxn{font-weight:700;font-size:.83rem;color:var(--text);}
.nyxm{font-family:monospace;font-size:.44rem;color:var(--purple);}
.nyxctrl{display:flex;gap:.3rem;}
.nc2{background:none;border:none;cursor:pointer;color:var(--text3);font-size:.9rem;transition:color .15s;}
.nc2:hover{color:var(--text);}
.nyxmsgs{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.65rem;}
.nyxe{text-align:center;padding-top:2rem;}
.nyxei{font-size:1.6rem;margin-bottom:.5rem;}
.nyxen{font-weight:700;font-size:.83rem;color:var(--text);margin-bottom:.3rem;}
.nyxed{font-family:monospace;font-size:.49rem;color:var(--text3);line-height:1.68;}
.nmsg{display:flex;flex-direction:column;}
.nmsg.u{align-items:flex-end;}
.nmsg.a{align-items:flex-start;}
.nbub{max-width:88%;padding:.5rem .72rem;font-size:.79rem;color:var(--text);line-height:1.68;white-space:pre-wrap;}
.nmsg.u .nbub{background:var(--accbg);border:1px solid var(--acc2);border-radius:12px 12px 3px 12px;}
.nmsg.a .nbub{background:rgba(167,139,250,.08);border:1px solid var(--border2);border-radius:12px 12px 12px 3px;}
.ndots{display:flex;gap:.3rem;align-items:center;padding:.5rem .72rem;background:rgba(167,139,250,.08);border:1px solid var(--border2);border-radius:12px 12px 12px 3px;}
.ndot{width:5px;height:5px;border-radius:50%;background:var(--purple);animation:pulse 1.2s infinite;}
.nyxf{padding:.65rem;border-top:1px solid var(--border);display:flex;gap:.4rem;}
.nyxinp{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:.46rem .7rem;color:var(--text);font-size:.79rem;outline:none;}
.nyxinp:focus{border-color:var(--acc2);}
.nyxs{background:var(--purplebg);color:var(--purple);border:1px solid var(--purple);border-radius:7px;padding:.42rem .65rem;cursor:pointer;font-size:.85rem;transition:all .15s;}
.nyxs:hover{background:var(--purple);color:#fff;}
/* MATURE */
#mwarn{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:400;display:none;align-items:center;justify-content:center;padding:1.5rem;}
#mwarn.show{display:flex;}
.mbox{background:var(--bg2);border:1px solid var(--red);border-radius:14px;max-width:430px;width:100%;padding:2rem;text-align:center;}
/* MESSAGES */
.msglayout{display:grid;grid-template-columns:210px 1fr;gap:1rem;height:calc(100vh - 148px);}
.msgcon{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;}
.msgci{display:flex;align-items:center;gap:.62rem;padding:.72rem 1rem;cursor:pointer;transition:all .15s;border-left:2px solid transparent;}
.msgci:hover{background:var(--accbg);}
.msgci.on{background:var(--accbg);border-left-color:var(--acc);}
.msgch{background:var(--card);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;overflow:hidden;}
.msgms{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.68rem;}
.mbw{display:flex;flex-direction:column;}
.mbw.mine{align-items:flex-end;}
.mbw.theirs{align-items:flex-start;}
.mbub{max-width:78%;padding:.52rem .72rem;font-size:.8rem;color:var(--text);line-height:1.65;}
.mbw.mine .mbub{background:var(--accbg);border:1px solid var(--acc2);border-radius:12px 12px 3px 12px;}
.mbw.theirs .mbub{background:var(--bg3);border:1px solid var(--border2);border-radius:12px 12px 12px 3px;}
.mtime{font-family:monospace;font-size:.43rem;color:var(--text3);margin-top:3px;padding:0 4px;}
/* DESIGN */
.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;}
.dcard{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s;}
.dcard:hover{border-color:var(--border2);transform:translateY(-3px);}
.dthumb{height:145px;overflow:hidden;background:linear-gradient(135deg,var(--bg3),var(--border));display:flex;align-items:center;justify-content:center;font-size:2.2rem;}
.dthumb img{width:100%;height:100%;object-fit:cover;}
/* SETTINGS */
.swatches{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.55rem;}
.swbtn{display:flex;align-items:center;gap:.3rem;background:transparent;color:var(--text2);border:1px solid var(--border2);padding:.25rem .5rem;border-radius:6px;cursor:pointer;font-size:.64rem;font-family:var(--font);transition:all .15s;}
.swbtn.on{border-color:var(--acc);color:var(--acc);background:var(--accbg);}
.swdot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
/* LEGAL */
.lg-sec{margin-bottom:1.75rem;}
.lg-h{font-weight:700;font-size:1rem;color:var(--text);margin-bottom:.6rem;padding-bottom:.42rem;border-bottom:1px solid var(--border);}
.lg-t{font-size:.87rem;color:var(--text2);line-height:1.9;}
/* TOAST */
#toast{position:fixed;bottom:5rem;right:1.5rem;background:var(--bg2);border:1px solid var(--border2);border-radius:9px;padding:.6rem 1rem;font-family:monospace;font-size:.52rem;color:var(--green);display:none;z-index:500;box-shadow:0 4px 20px rgba(0,0,0,.3);}
#toast.show{display:block;animation:up .2s ease;}
/* DRAFTS */
.dritem{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.15rem 1.3rem;display:flex;gap:.9rem;align-items:flex-start;margin-bottom:.78rem;cursor:pointer;transition:border-color .15s;}
.dritem:hover{border-color:var(--border2);}
.drcov{width:64px;height:64px;border-radius:8px;object-fit:cover;flex-shrink:0;}
/* ANNOUNCE */
.annbanner{background:linear-gradient(135deg,var(--accbg),transparent);border:1px solid var(--acc2);border-radius:10px;padding:.9rem 1.15rem;margin-bottom:1.75rem;display:flex;gap:.65rem;align-items:flex-start;}
/* STREAKS */
.strk{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:2rem;}
.strc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;display:flex;align-items:center;gap:.75rem;}
/* COMMUNITY CARDS */
.comgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(178px,1fr));gap:1rem;}
.comcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.3rem;text-align:center;cursor:pointer;transition:all .2s;}
.comcard:hover{border-color:var(--acc2);transform:translateY(-3px);}
/* EMPTY */
.empty{text-align:center;padding:3.5rem;color:var(--text3);}
.empty-ico{font-size:2rem;margin-bottom:.75rem;}
.empty-t{font-weight:700;font-size:.92rem;color:var(--text);margin-bottom:.4rem;font-family:var(--font);}
.empty-s{font-family:monospace;font-size:.52rem;color:var(--text3);}
/* RESPONSIVE */
@media(max-width:720px){
  #sb{display:none!important;}
  #mobnav{display:flex;}
  #main{margin-bottom:62px;}
  .sg{grid-template-columns:repeat(2,1fr)!important;}
  .cgrid{grid-template-columns:repeat(2,1fr)!important;}
  .msglayout{grid-template-columns:1fr!important;}
  .strk{grid-template-columns:1fr 1fr;}
  .asgs{grid-template-columns:repeat(2,1fr)!important;}
}
@media(max-width:420px){.cgrid{grid-template-columns:1fr!important;}}

<body>
<div id="app">
  <aside id="sb">
    <div class="sb-head">
      <div class="sb-brand" id="sbrand">
        <div class="sb-name">The Nexus</div>
        <div class="sb-sub">Creative Universe</div>

    </div>
    <nav class="sb-nav" id="sbnav"></nav>
    <div class="sb-foot">
      <div class="sb-user">
        <div class="uav" id="uav" onclick="openSettings()">H</div>

  </main>
  <nav id="mobnav"></nav>
</div>
<div id="mwarn">
  <div class="mbox">
    <div style="font-size:2.5rem;margin-bottom:.85rem">⚠️</div>
    <div style="font-weight:700;font-size:1.05rem;color:var(--red);margin-bottom:.6rem">Mature Content — 18+</div>
    <div style="font-size:.86rem;color:var(--text2);line-height:1.8;margin-bottom:1.5rem">This content is marked as mature. By continuing you confirm you are of appropriate age in your jurisdiction.</div>
    <div style="display:flex;gap:.85rem;justify-content:center">
      <button class="btn btn-r" id="mconf">I confirm, I'm 18+</button>

    </div>
  </div>
</div>
<div id="ovroot"></div>
<div id="nyx-btn" onclick="toggleNyx()">✦</div>
<div id="nyx-panel">
  <div class="nyxh">
    <div class="nyxta">
      <div class="nyxico">✦</div>
      <div><div class="nyxn">Nyx</div><div class="nyxm" id="nyxmode">Nexus AI</div></div>
    </div>
    <div class="nyxctrl">
      <button class="nc2" onclick="clearNyx()" title="Clear">↺</button>
      <button class="nc2" onclick="toggleNyx()">✕</button>
    </div>
  </div>
  <div class="nyxmsgs" id="nyxmsgs">
    <div class="nyxe"><div class="nyxei">✦</div><div class="nyxen">I'm Nyx.</div><div class="nyxed">Ask me about your characters, lore, writing — or just talk.</div></div>
  </div>
  <div class="nyxf">
    <input class="nyxinp" id="nyxinp" placeholder="Ask Nyx..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendNyx();}">
    <button class="nyxs" onclick="sendNyx()">✦</button>
  </div>
</div>
<div id="toast"></div>
<script>
'use strict';
// ── STORAGE ──
const K={d:'nx10:d',c:'nx10:c',s:'nx10:s',st:'nx10:st',er:'nx10:er'};
const ld=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const logErr=m=>{const e=ld(K.er)||[];e.unshift({m,t:new Date().toISOString()});sv(K.er,e.slice(0,40));};

// ── DEFAULTS ──
const DC={admin:{user:btoa('The Creator'),pass:btoa('chiboy2025')},owner:{user:'Hunter',pass:''}};
const DS={bg:'#0c0d10',acc:'#e8b84b',font:'Georgia,serif',streaks:true};
const DD={
  characters:[],worlds:[],lore:[],poetry:[],stories:[],writes:[],designs:[],
  pending:[],trash:[],announcements:[],suggestions:[],dms:{},
  siteDown:false,loginsLocked:false,
  users:[{id:'hunter',name:'Hunter',role:'owner',status:'active',joined:new Date().toISOString()}],
  analytics:{visits:{},pages:{}}
};
const TF={characters:'Character',worlds:'World',lore:'Lore Entry',poetry:'Poem',stories:'Story'};
const GE={
  characters:['Dark Fantasy','Superhero','Magic','Sci-Fi','Horror','Fantasy','Original'],
  worlds:['Dark Fantasy','Sci-Fi','Fantasy','God-Game','Magic','Original'],
  lore:['Ability','Artifact','System','History','Faction','Event'],
  poetry:['African Nations','Dark','Mythic','Personal','Nature','Political','Other'],
  stories:['Dark Fantasy','Superhero','Magic','Sci-Fi','Horror','Fantasy','Original']
};
const TABS=[
  {id:'home',icon:'⬡',label:'Home',sec:'explore'},
  {id:'library',icon:'📚',label:'Library',sec:'explore'},
  {id:'characters',icon:'◈',label:'Characters',sec:'explore'},
  {id:'worlds',icon:'◎',label:'Worlds',sec:'explore'},
  {id:'lore',icon:'✦',label:'Lore',sec:'explore'},
  {id:'poetry',icon:'◇',label:'Poetry',sec:'explore'},
  {id:'stories',icon:'▷',label:'Stories',sec:'explore'},
  {id:'designs',icon:'🎨',label:'Designs',sec:'explore'},
  {id:'write',icon:'✎',label:'Write',sec:'create'},
  {id:'drafts',icon:'📋',label:'Drafts',sec:'create'},
  {id:'ranking',icon:'▲',label:'Rankings',sec:'community'},
  {id:'suggest',icon:'💡',label:'Suggestions',sec:'community'},
  {id:'community',icon:'↑',label:'Community',sec:'community'},
  {id:'messages',icon:'✉',label:'Messages',sec:'community'},
  {id:'privacy',icon:'🔏',label:'Privacy Policy',sec:'legal'},
  {id:'terms',icon:'📜',label:'Terms of Service',sec:'legal'}
];
const MOBT=[
  {id:'home',icon:'⬡',label:'Home'},
  {id:'library',icon:'📚',label:'Library'},
  {id:'write',icon:'✎',label:'Write'},
  {id:'ranking',icon:'▲',label:'Rank'},
  {id:'suggest',icon:'💡',label:'Ideas'}
];
const TITLES={home:'Home',library:'Library',characters:'Characters',worlds:'Worlds',lore:'Lore',poetry:'Poetry',stories:'Stories',designs:'Designs & Art',write:'Write',drafts:'My Drafts',ranking:'Rankings',suggest:'Suggestion Box',community:'Community',messages:'Messages',privacy:'Privacy Policy',terms:'Terms of Service'};

// ── STATE ──
let S={
  tab:'home',sbOpen:true,
  data:{...DD,...(ld(K.d)||{})},
  creds:{...DC,...(ld(K.c)||{})},
  settings:{...DS,...(ld(K.s)||{})},
  streaks:ld(K.st)||{vs:0,ws:0,bv:0,bw:0,lv:'',hist:{}},
  admin:{auth:false,open:false,sec:'overview'},
  ui:{
    filter:'All',search:'',
    libFilter:'All',libSort:'newest',libSearch:'',libReading:null,
    viewDraft:null,ratings:{},userRatings:{},
    activeDM:null,matureQ:null,matureAcked:[],
    addForm:null,addType:'characters',
    bdf:'all',massType:'characters'
  },
  nyx:{open:false,msgs:[],loading:false,stream:''},
  vToday:0,vTotal:0
};
function setData(fn){S.data=typeof fn==='function'?fn(S.data):{...S.data,...fn};sv(K.d,S.data);}
function persist(){sv(K.d,S.data);sv(K.c,S.creds);sv(K.s,S.settings);sv(K.st,S.streaks);}

// ── THEME ──
function applyTheme(){
  const s=S.settings;
  const n=parseInt(s.bg.replace('#',''),16);
  const r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  const lx=(x,a)=>Math.min(x+a,255);
  const R=document.documentElement;
  R.style.setProperty('--bg',s.bg);
  R.style.setProperty('--bg2',`rgb(${lx(r,8)},${lx(g,8)},${lx(b,8)})`);
  R.style.setProperty('--bg3',`rgb(${lx(r,17)},${lx(g,17)},${lx(b,17)})`);
  R.style.setProperty('--card',`rgb(${lx(r,22)},${lx(g,22)},${lx(b,22)})`);
  R.style.setProperty('--acc',s.acc);
  R.style.setProperty('--acc2',s.acc+'b0');
  R.style.setProperty('--accbg',s.acc+'15');
  R.style.setProperty('--font',s.font);
  document.body.style.fontFamily=s.font;
}

// ── STREAKS ──
function initStreaks(){
  const today=new Date().toISOString().split('T')[0];
  const yest=new Date(Date.now()-864e5).toISOString().split('T')[0];
  const st=S.streaks;
  if(st.lv!==today){
    st.vs=st.lv===yest?(st.vs||0)+1:1;
    st.bv=Math.max(st.bv||0,st.vs);
    st.lv=today;st.hist=st.hist||{};
    st.hist[today]=(st.hist[today]||0)+1;
    S.streaks=st;sv(K.st,st);
  }
  const hist=st.hist||{};
  S.vToday=hist[today]||0;
  S.vTotal=Object.values(hist).reduce((a,b)=>a+b,0);
}
function updateStreak(){
  const st=S.streaks;
  const el=document.getElementById('strbar');
  if(el&&S.settings.streaks)el.innerHTML=`
    <span class="str-i" style="color:${st.vs>0?'var(--acc)':'var(--text3)'}">🔥${st.vs||0}d</span>
    <span class="str-i" style="color:${st.ws>0?'var(--green)':'var(--text3)'}">✎${st.ws||0}d</span>
    <span class="str-i" style="color:var(--text3)">👁${S.vToday}</span>`;
  const vs=document.getElementById('vstats');
  if(vs)vs.textContent=`👁 ${S.vToday} today · ${S.vTotal} total`;
}

// ── ANALYTICS ──
function trackPage(tab){
  const today=new Date().toISOString().split('T')[0];
  const a={...S.data.analytics,visits:{...S.data.analytics?.visits},pages:{...S.data.analytics?.pages}};
  a.visits[today]=(a.visits[today]||0)+1;
  a.pages[tab]=(a.pages[tab]||0)+1;
  S.data={...S.data,analytics:a};sv(K.d,S.data);
}

// ── HELPERS ──
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
const vis=t=>(S.data[t]||[]).filter(i=>i.visible);
const allOf=t=>S.data[t]||[];
const filt=type=>{
  let items=vis(type);
  if(S.ui.filter!=='All')items=items.filter(i=>i.genre===S.ui.filter);
  const q=(S.ui.search||'').toLowerCase().trim();
  if(q)items=items.filter(i=>(i.title||'').toLowerCase().includes(q)||(i.desc||'').toLowerCase().includes(q)||(i.tags||[]).some(t=>t.toLowerCase().includes(q)));
  return items;
};
const alphaG=items=>{const g={};items.forEach(i=>{const l=(i.title||'?')[0].toUpperCase();if(!g[l])g[l]=[];g[l].push(i);});return Object.entries(g).sort(([a],[b])=>a.localeCompare(b));};
let toastTmr;
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(toastTmr);toastTmr=setTimeout(()=>el.classList.remove('show'),2500);}

// ── EXPORTS ──
function expTXT(t,h){const d=document.createElement('div');d.innerHTML=h;const b=new Blob([t+'\n\n'+d.innerText],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=t.replace(/\s+/g,'_')+'.txt';a.click();}
function expPDF(t,h){const w=window.open('','_blank');if(!w)return;w.document.write(`<html><head><title>${t}</title><style>body{font-family:Georgia,serif;max-width:800px;margin:40px auto;padding:20px;color:#111;line-height:1.9;}@media print{body{margin:0;}}img{max-width:100%;}</style></head><body><h1>${t}</h1>${h}</body></html>`);w.document.close();setTimeout(()=>w.print(),500);}
function expJSON(){const b=new Blob([JSON.stringify(S.data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='nexus_backup_'+new Date().toISOString().split('T')[0]+'.json';a.click();}

// ── CONTENT ──
function addItem(item){
  const tags=typeof item.tags==='string'?item.tags.split(',').map(t=>t.trim()).filter(Boolean):(item.tags||[]);
  setData(d=>({...d,[item.type]:[...(d[item.type]||[]),{...item,id:Date.now().toString(),visible:true,likes:0,tags,created:new Date().toISOString()}]}));
}
function likeItem(type,id){
  setData(d=>({...d,[type]:d[type].map(i=>i.id===id?{...i,likes:(i.likes||0)+1}:i)}));
  rerender();
}
function deleteItem(type,id){
  const item=(S.data[type]||[]).find(i=>i.id===id);
  if(!item)return;
  setData(d=>({...d,[type]:d[type].filter(i=>i.id!==id),trash:[...(d.trash||[]),{...item,_type:type,_del:new Date().toISOString()}]}));
}
function toggleVisible(type,id){setData(d=>({...d,[type]:d[type].map(i=>i.id===id?{...i,visible:!i.visible}:i)}));}
function toggleMature(type,id){setData(d=>({...d,[type]:d[type].map(i=>i.id===id?{...i,mature:!i.mature}:i)}));}

// ── MATURE ──
let mCb=null;
function openCard(item,type,isLib=false){
  if(item.mature&&!S.ui.matureAcked.includes(item.id)){
    mCb=()=>{S.ui.matureAcked.push(item.id);if(isLib){S.ui.libReading=item;rerender();}else openModal(item,type);};
    document.getElementById('mwarn').classList.add('show');
    document.getElementById('mconf').onclick=()=>{document.getElementById('mwarn').classList.remove('show');if(mCb){mCb();mCb=null;}};
    return;
  }
  if(isLib){S.ui.libReading=item;rerender();}else openModal(item,type);
}
function closeMature(){document.getElementById('mwarn').classList.remove('show');mCb=null;}

// ── ITEM MODAL ──
function openModal(item,type){
  document.getElementById('ovroot').innerHTML=`
    <div class="ov fade" onclick="if(event.target===this)closeOv()">
      <div class="ob">
        <div class="oh">
          <div>
            <div style="margin-bottom:4px"><span class="bdg bdg-g">${esc(type)}${item.genre?'·'+esc(item.genre):''}</span></div>
            <div style="font-weight:700;font-size:1.3rem;color:var(--text);margin-top:4px">${esc(item.title)}</div>
          </div>
          <button class="oc" onclick="closeOv()">✕</button>
        </div>
        <div class="obody">
          ${item.cover?`<img src="${item.cover}" style="width:100%;border-radius:10px;margin-bottom:1.25rem;max-height:190px;object-fit:cover" loading="lazy">`:''}
          ${item.mature?'<div style="margin-bottom:.85rem"><span class="bdg bdg-r">Mature Content — 18+</span></div>':''}
          <p style="color:var(--text2);line-height:1.9;margin-bottom:1.25rem;font-size:.87rem">${esc(item.desc||'')}</p>
          ${item.abilities?`<div class="lbl">Abilities</div><div style="background:var(--bg3);padding:.85rem 1rem;border-radius:8px;font-size:.82rem;color:var(--text);line-height:1.75;margin-bottom:1.25rem">${esc(item.abilities)}</div>`:''}
          ${item.world?`<div class="lbl">World</div><p style="font-size:.82rem;color:var(--text2);line-height:1.75;margin-bottom:1.25rem">${esc(item.world)}</p>`:''}
          ${(item.tags||[]).length?`<div style="margin-bottom:1.25rem">${item.tags.map(t=>`<span style="font-family:monospace;font-size:.45rem;padding:.16rem .42rem;border-radius:5px;border:1px solid var(--border2);color:var(--text2);display:inline-block;margin:0 .2rem .25rem 0">${esc(t)}</span>`).join('')}</div>`:''}
          <div style="display:flex;gap:.7rem;padding-top:.75rem;border-top:1px solid var(--border)">
            <button class="btn btn-gh" onclick="likeItem('${type}','${item.id}');updateLikeBtn(this,'${type}','${item.id}')">♥${item.likes||0} Likes</button>
            <span style="font-family:monospace;font-size:.47rem;color:var(--text3);align-self:center">By ${esc(item.author||'?')}</span>
          </div>
        </div>
      </div>
    </div>`;
}
function updateLikeBtn(btn,type,id){const item=(S.data[type]||[]).find(i=>i.id===id);if(item)btn.textContent='♥'+(item.likes||0)+' Likes';}
function closeOv(){document.getElementById('ovroot').innerHTML='';}

// ── NAVIGATION ──
function go(tab){S.tab=tab;S.ui.filter='All';S.ui.search='';S.ui.libReading=null;S.ui.viewDraft=null;S.ui.addForm=null;trackPage(tab);render();}

// ── NYX ──
function toggleNyx(){S.nyx.open=!S.nyx.open;document.getElementById('nyx-btn').style.display=S.nyx.open?'none':'flex';document.getElementById('nyx-panel').className=S.nyx.open?'open':'';document.getElementById('nyxmode').textContent=S.admin.auth?'Admin Mode':'Nexus AI';}
function clearNyx(){S.nyx.msgs=[];renderNyx();}
function renderNyx(){
  const el=document.getElementById('nyxmsgs');if(!el)return;
  if(!S.nyx.msgs.length&&!S.nyx.loading){el.innerHTML=`<div class="nyxe"><div class="nyxei">✦</div><div class="nyxen">I'm Nyx.</div><div class="nyxed">Ask me about your characters, lore, writing — or just talk.${S.admin.auth?'<br><span style="color:var(--purple)">Admin mode active.</span>':''}</div></div>`;return;}
  el.innerHTML=S.nyx.msgs.map(m=>`<div class="nmsg ${m.role==='user'?'u':'a'}"><div class="nbub">${esc(m.content)}</div></div>`).join('')+
  (S.nyx.stream?`<div class="nmsg a"><div class="nbub">${esc(S.nyx.stream)}▍</div></div>`:'')+(S.nyx.loading&&!S.nyx.stream?`<div class="nmsg a"><div class="ndots"><div class="ndot"></div><div class="ndot" style="animation-delay:.2s"></div><div class="ndot" style="animation-delay:.4s"></div></div></div>`:'');
  el.scrollTop=el.scrollHeight;
}
async function sendNyx(){
  const inp=document.getElementById('nyxinp');const text=inp?.value?.trim();
  if(!text||S.nyx.loading)return;
  S.nyx.msgs.push({role:'user',content:text});inp.value='';S.nyx.loading=true;S.nyx.stream='';renderNyx();
  const chars=vis('characters').map(c=>c.title).join(', ')||'none yet';

function rateItem(id,val){
  const prev=S.ui.ratings[id]||{count:0,total:0};const already=S.ui.userRatings[id];
  if(already){const nt=prev.total-already+val;S.ui.ratings[id]={count:prev.count,total:nt,avg:Math.round((nt/prev.count)*10)/10};}
  else S.ui.ratings[id]={count:prev.count+1,total:prev.total+val,avg:Math.round(((prev.total+val)/(prev.count+1))*10)/10};
  S.ui.userRatings[id]=val;
}
function recItem(id,type){
  if(!type||!S.data[type])return;
  setData(d=>({...d,[type]:d[type].map(i=>i.id===id?{...i,likes:(i.likes||0)+1}:i)}));
  rerender();
}

function e2(cmd,ev){ev.preventDefault();document.execCommand(cmd,false,null);document.getElementById('wed')?.focus();}
function e3(cmd,val,ev){if(ev&&ev.preventDefault)ev.preventDefault();document.execCommand(cmd,false,val);document.getElementById('wed')?.focus();}
function setWCover(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{wCoverData=ev.target.result;const wrap=document.getElementById('wcoverwrap');if(wrap){wrap.style.height='170px';wrap.innerHTML=`<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:10px"><div style="position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center"><span style="color:#fff;font-family:monospace;font-size:.52rem">CHANGE COVER</span></div><input type="file" id="wcover" accept="image/*" style="display:none" onchange="setWCover(this)">`;wrap.onclick=()=>document.getElementById('wcover')?.click();}};r.readAsDataURL(f);
}
function insTable(ev){
  ev.preventDefault();
  const b2=getComputedStyle(document.documentElement).getPropertyValue('--border2').trim();
  let t='<table style="border-collapse:collapse;width:100%;margin:14px 0">';
  for(let i=0;i<3;i++){t+='<tr>';for(let j=0;j<3;j++)t+=`<td style="border:1px solid ${b2};padding:10px 14px;min-width:80px" contenteditable="true">${i===0?'H'+(j+1):''}</td>`;t+='</tr>';}t+='</table>';
  document.execCommand('insertHTML',false,t);document.getElementById('wed')?.focus();
}
function insImg(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{document.execCommand('insertHTML',false,`<img src="${ev.target.result}" style="max-width:100%;border-radius:10px;margin:10px 0;display:block">`);}; r.readAsDataURL(f);
}
function insDec(type){
  const acc=getComputedStyle(document.documentElement).getPropertyValue('--acc').trim();
  const accbg=getComputedStyle(document.documentElement).getPropertyValue('--accbg').trim();
  const t2=getComputedStyle(document.documentElement).getPropertyValue('--text2').trim();
  const map={
    quote:`<blockquote style="border-left:3px solid ${acc};padding:12px 16px;margin:14px 0;background:${accbg};border-radius:0 10px 10px 0;font-style:italic;color:${t2}">Quote here...</blockquote>`,
    divider:`<div style="text-align:center;color:${acc};font-size:1rem;margin:16px 0;letter-spacing:.6em">✦ ◈ ✦</div>`,
    callout:`<div style="background:rgba(90,158,248,.08);border:1px solid rgba(90,158,248,.2);border-radius:10px;padding:14px 16px;margin:12px 0">📌 Callout text here...</div>`
  };
  document.execCommand('insertHTML',false,map[type]||'');document.getElementById('wed')?.focus();
}
function updWC(){
  const ed=document.getElementById('wed');const el=document.getElementById('wwc');if(!ed||!el)return;
  const t=ed.innerText||'';el.textContent=(t.trim()?t.trim().split(/\s+/).length:0)+' words · '+t.length+' chars';
}
function clearWrite(){
  const ed=document.getElementById('wed');const ti=document.getElementById('wtitle');
  if(ed)ed.innerHTML='';if(ti)ti.value='';wCoverData=null;updWC();

function saveDraft(){
  const title=document.getElementById('wtitle')?.value?.trim();
  const content=document.getElementById('wed')?.innerHTML||'';

  const ed=document.getElementById('wed');
  const wc=ed?(ed.innerText.trim().split(/\s+/).length||0):0;
  const draft={id:Date.now().toString(),title,content,type:document.getElementById('wtype')?.value||'stories',genre:document.getElementById('wgenre')?.value||'',tags:(document.getElementById('wtags')?.value||'').split(',').map(t=>t.trim()).filter(Boolean),author:S.creds.owner.user,wc,cover:wCoverData,desc:(ed?.innerText||'').slice(0,130),visible:true,created:new Date().toISOString(),icon:'✎'};
  setData(d=>({...d,writes:[...(d.writes||[]),draft]}));
  const msg=document.getElementById('wsaved');if(msg){msg.style.display='inline';setTimeout(()=>msg.style.display='none',2000);}

      <textarea class="ta" id="sug-d" placeholder="Describe what you want and why it would help..."></textarea>
      <div id="sugsent" style="font-family:monospace;font-size:.52rem;color:var(--green);margin:.5rem 0;display:none">✓ Submitted! The creator will review it.</div>
      <div style="margin-top:.75rem"><button class="btn btn-g" onclick="submitSug()">💡 Submit Idea</button></div>
    </div>
    <div class="sec-hdr"><div class="sec-t">Community Ideas (${sugs.length})</div></div>
    ${sugs.length===0?'<div class="empty"><div class="empty-s">No suggestions yet. Be the first.</div></div>':''}
    ${sugs.slice().sort((a,b)=>(b.votes||0)-(a.votes||0)).map(sg=>`
      <div class="scard">
        <div class="sinner">
          <div class="vcol">
            <button class="vbtn" onclick="voteSug('${sg.id}')">▲</button>
            <div class="vcnt">${sg.votes||0}</div>
            <div class="vlbl">votes</div>
          </div>
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.45rem;flex-wrap:wrap">
              <div style="font-weight:700;font-size:.9rem;color:var(--text)">${esc(sg.title)}</div>
              <span class="bdg ${sg.status==='approved'?'bdg-gr':sg.status==='rejected'?'bdg-r':'bdg-b'}">${sg.status||'pending'}</span>
            </div>
            <div style="font-size:.81rem;color:var(--text2);line-height:1.7;margin-bottom:.45rem">${esc(sg.desc||'')}</div>
            <div style="font-family:monospace;font-size:.44rem;color:var(--text3)">By ${esc(sg.author||'Anonymous')} · ${new Date(sg.created).toLocaleDateString()}</div>
          </div>
        </div>
      </div>`).join('')}`;
}
function submitSug(){
  const title=document.getElementById('sug-t')?.value?.trim();const desc=document.getElementById('sug-d')?.value?.trim();
  if(!title||!desc){toast('Fill in both fields');return;}
  setData(d=>({...d,suggestions:[...(d.suggestions||[]),{id:Date.now().toString(),title,desc,author:S.creds.owner.user,votes:0,status:'pending',created:new Date().toISOString()}]}));
  document.getElementById('sug-t').value='';document.getElementById('sug-d').value='';
  const sent=document.getElementById('sugsent');if(sent){sent.style.display='block';setTimeout(()=>sent.style.display='none',3000);}
  toast('✓ Idea submitted!');
}
function voteSug(id){
  setData(d=>({...d,suggestions:d.suggestions.map(s=>s.id===id?{...s,votes:(s.votes||0)+1}:s)}));
  rerender();
}

// ── TAB: MESSAGES ──
function tabMessages(){
  const contacts=(S.data.users||[]).filter(u=>u.id!=='hunter');
  const active=S.ui.activeDM;
  const dmKey=active?['Hunter',active].sort().join('_'):null;
  const messages=dmKey?(S.data.dms?.[dmKey]||[]):[];
  return `
    <div class="msglayout">
      <div class="msgcon">
        <div style="padding:.88rem 1rem;border-bottom:1px solid var(--border);font-weight:700;font-size:.84rem;color:var(--text)">Messages</div>
        <div style="flex:1;overflow-y:auto">
          ${contacts.length===0?'<div style="padding:2rem;text-align:center;color:var(--text3);font-family:monospace;font-size:.53rem">No users yet.</div>':''}
          ${contacts.map(u=>`
            <div class="msgci ${active===u.name?'on':''}" onclick="S.ui.activeDM='${esc(u.name)}';rerender()">
              <div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;color:#fff;flex-shrink:0">${u.name[0].toUpperCase()}</div>
              <div>
                <div style="font-weight:700;font-size:.8rem;color:${active===u.name?'var(--acc)':'var(--text)'}">${esc(u.name)}</div>
                <div style="font-family:monospace;font-size:.44rem;color:var(--text3)">${u.role}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>
      <div class="msgch">
        ${!active?`<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3);font-family:monospace;font-size:.57rem">Select a contact to start chatting</div>`:`
          <div style="padding:.88rem 1rem;border-bottom:1px solid var(--border);font-weight:700;font-size:.87rem;color:var(--text)">@ ${esc(active)}</div>
          <div class="msgms" id="msglist">
            ${messages.length===0?'<div style="text-align:center;padding:2rem;color:var(--text3);font-family:monospace;font-size:.53rem">No messages yet.</div>':''}
            ${messages.map(m=>`
              <div class="mbw ${m.from==='Hunter'?'mine':'theirs'}">
                <div class="mbub">${esc(m.text)}</div>
                <div class="mtime">${new Date(m.time).toLocaleTimeString()}</div>
              </div>`).join('')}
          </div>
          <div style="padding:.72rem;border-top:1px solid var(--border);display:flex;gap:.42rem">
            <input class="inp" id="dminp" placeholder="Message ${esc(active)}..." onkeydown="if(event.key==='Enter')sendDM()" style="flex:1">
            <button class="btn btn-g" onclick="sendDM()">Send</button>
          </div>`}
      </div>
    </div>`;
}
function sendDM(){
  const inp=document.getElementById('dminp');const text=inp?.value?.trim();const active=S.ui.activeDM;
  if(!text||!active)return;
  const key=['Hunter',active].sort().join('_');
  const msg={id:Date.now().toString(),from:'Hunter',text,time:new Date().toISOString()};
  setData(d=>({...d,dms:{...d.dms,[key]:[...(d.dms[key]||[]),msg]}}));
  inp.value='';rerender();
  setTimeout(()=>{const list=document.getElementById('msglist');if(list)list.scrollTop=list.scrollHeight;},50);
}

function updateGenreSelect(type){const el=document.getElementById('wgenre');if(!el)return;el.innerHTML='<option value="">Genre...</option>'+(GE[type]||[]).map(g=>'<option>'+g+'</option>').join('');}
// ── RENDER SYSTEM ──
function getTab(tab){
  switch(tab){
    case 'home':return tabHome();
    case 'library':return tabLibrary();
    case 'characters':return tabCharacters();
    case 'worlds':return tabGrid('worlds');
    case 'lore':return tabGrid('lore');
    case 'poetry':return tabPoetry();
    case 'stories':return tabGrid('stories');
    case 'designs':return tabDesigns();
    case 'write':return tabWrite();
    case 'drafts':return tabDrafts();
    case 'ranking':return tabRanking();
    case 'suggest':return tabSuggestions();
    case 'community':return tabCommunity();
    case 'messages':return tabMessages();
    case 'privacy':return tabPrivacy();
    case 'terms':return tabTerms();
    default:return tabHome();
  }
}
function buildSidebar(){
  const sb=document.getElementById('sb');const isOpen=S.sbOpen;
  sb.className=isOpen?'':'col';
  document.getElementById('sbrand').style.display=isOpen?'block':'none';
  document.getElementById('sbsrch').style.display=isOpen?'block':'none';
  document.getElementById('uinfo').style.display=isOpen?'block':'none';
  document.getElementById('strbar').style.display=isOpen&&S.settings.streaks?'flex':'none';
  document.getElementById('sbtog').textContent=isOpen?'◀':'▶';
  const secs=['explore','create','community','legal'];
  document.getElementById('sbnav').innerHTML=secs.map(sec=>{
    const tabs=TABS.filter(t=>t.sec===sec);
    const lbl=isOpen?`<div class="sb-sec">${sec}</div>`:'<div style="border-top:1px solid var(--border)"></div>';
    const skip=['write','drafts','messages','privacy','terms','library','suggest'];
    const items=tabs.map(t=>{
      const cnt=!skip.includes(t.id)?(vis(t.id)?.length||0):0;
      const on=S.tab===t.id;
      return `<div class="ni${on?' on':''}" onclick="go('${t.id}')">
        <span class="ni-ico">${t.icon}</span>
        ${isOpen?`<span class="nl">${t.label}</span>`:''}
        ${isOpen&&cnt>0?`<span class="nc">${cnt}</span>`:''}
      </div>`;
    }).join('');
    return lbl+items;
  }).join('');
  document.getElementById('mobnav').innerHTML=MOBT.map(t=>`
    <button class="mb${S.tab===t.id?' on':''}" onclick="go('${t.id}')">
      <span class="mbi">${t.icon}</span>
      <span class="mbl">${t.label}</span>
    </button>`).join('');
}
function render(){
  applyTheme();
  buildSidebar();
  document.getElementById('tbtitle').textContent=TITLES[S.tab]||S.tab;
  document.getElementById('adot').className=S.admin.auth?'on':'';
  document.getElementById('content').innerHTML=`<div class="fade">${getTab(S.tab)}</div>`;
  updateStreak();updateUser();
}
function rerender(){render();}

// ── INIT ──
document.getElementById('adot').addEventListener('click',openAdmin);
document.getElementById('sbtog').addEventListener('click',()=>{S.sbOpen=!S.sbOpen;buildSidebar();});
document.addEventListener('input',e=>{
  if(e.target.id==='sbsearch'){S.ui.search=e.target.value;const c=document.getElementById('content');if(c)c.innerHTML=`<div class="fade">${getTab(S.tab)}</div>`;}
});
initStreaks();applyTheme();render();
</script>
